<script>
function calc() {
    var d = parseFloat(document.getElementById('diam').value);
    var h = parseFloat(document.getElementById('ht').value); // Altezza in cm
    var w = parseFloat(document.getElementById('wt').value); // Peso in kg
    
    if (!d) { alert("Please enter diameter"); return; }

    // Calcolo BSA (Formula di Mosteller)
    var bsa = (h && w) ? Math.sqrt((h * w) / 3600) : null;
    // Calcolo AHI (Aortic Height Index)
    var ahi = (h) ? (d / 10) / (h / 100) : null;

    var level = 0;
    var factors = [];

    // --- FILTRO DINAMICO BASATO SULL'ALTEZZA ---
    // Se l'altezza è nota, usiamo l'indice AHI > 2.0 come "dilatata"
    // Altrimenti usiamo il default di 40mm
    var isDilated = false;
    if (ahi) {
        isDilated = (ahi >= 2.0 || d >= 40); 
    } else {
        isDilated = (d >= 40);
    }

    // --- LOGICA SINTOMI ---
    if (isDilated && S.s1 === 'y') {
        level = 3;
        factors.push({c:'r', t:'Acute Pain on Dilated Aorta (AHI or >40mm): URGENT'});
    } else if (!isDilated && S.s1 === 'y') {
        factors.push({c:'a', t:'Pain reported but Aorta is size-appropriate. Check other causes.'});
    }

    // --- CRITERI INDICIZZATI (Yale/Zafar) ---
    if (ahi >= 2.44) {
        level = Math.max(level, 2);
        factors.push({c:'r', t:'AHI ≥ 2.44 cm/m: Surgical threshold reached by height index'});
    }

    // ... (restante logica dei diametri fissi 50/55mm)
}
</script>
